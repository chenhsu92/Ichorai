<meta charset="UTF-8"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #F4F4F1;
  --surface:    #FFFFFF;
  --border:     #C8C8C0;
  --border-dk:  #1A1A18;
  --mint:       #3DC98A;
  --mint-light: #E8F9F1;
  --mint-dark:  #1A7A4A;
  --sage:       #7ABFA0;
  --ink:        #1A1A18;
  --ink-mid:    #4A4A44;
  --ink-light:  #9A9A90;
  --mono: 'DM Mono', 'Courier New', monospace;
  --sans: 'DM Sans', 'Helvetica Neue', sans-serif;
}
body {
  background: #EAEAE5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  font-family: var(--mono);
}
.header {
  width: 100%; max-width: 900px;
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 18px;
  animation: fadeUp 0.55s ease both;
}
.header-sub { font-size: 8.5px; color: var(--ink-light); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 5px; }
.header-title { font-family: var(--sans); font-size: 20px; color: var(--ink);
  letter-spacing: 1.5px; font-weight: 600; }
.header-title span { font-size: 11px; color: var(--mint); margin-left: 10px;
  font-family: var(--mono); font-weight: 400; }
.header-right { display: flex; gap: 14px; align-items: center; }
.live-wrap { display: flex; align-items: center; gap: 6px;
  font-size: 7.5px; color: var(--ink-light); letter-spacing: 2px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%;
  background: var(--mint); animation: blink 2s ease infinite; }
.btn-export {
  background: none; border: 1px solid var(--border);
  color: var(--ink-mid); font-size: 7.5px; font-family: var(--mono);
  letter-spacing: 2px; padding: 6px 14px; cursor: pointer;
  text-transform: uppercase; border-radius: 2px; transition: all 0.2s;
}
.btn-export:hover { border-color: var(--mint); color: var(--mint-dark); }
svg { display: block; }
.legend {
  width: 100%; max-width: 900px;
  display: flex; gap: 28px; margin-top: 14px; flex-wrap: wrap;
  animation: fadeUp 0.55s ease 0.45s both; opacity: 0;
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-line { width: 20px; height: 1.5px; }
.legend-label { font-size: 8px; color: var(--ink-light); letter-spacing: 0.8px; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
@keyframes blink { 50% { opacity: 0.3; } }
@keyframes dashH { to { stroke-dashoffset: -100; } }
@keyframes dashV { to { stroke-dashoffset: -140; } }
@keyframes dashI { to { stroke-dashoffset: -60;  } }

.flow-h-0 { animation: dashH 2.2s linear infinite 0.0s; }
.flow-h-1 { animation: dashH 2.2s linear infinite 0.4s; }
.flow-h-2 { animation: dashH 2.2s linear infinite 0.8s; }
.flow-int  { animation: dashI 1.8s linear infinite 0.0s; }
.flow-int2 { animation: dashI 1.8s linear infinite 0.5s; }
.flow-v-main { animation: dashV 2.8s linear infinite 0.0s; }
.flow-v-0    { animation: dashV 3.2s linear infinite 0.2s; }
.flow-v-1    { animation: dashV 3.4s linear infinite 0.6s; }
.flow-v-2    { animation: dashV 3.6s linear infinite 1.0s; }

/* Staggered box reveals */
.box-0 { animation: fadeUp 0.45s ease 0.30s both; opacity: 0; }
.box-1 { animation: fadeUp 0.45s ease 0.45s both; opacity: 0; }
.box-2 { animation: fadeUp 0.45s ease 0.55s both; opacity: 0; }
.box-3 { animation: fadeUp 0.45s ease 0.60s both; opacity: 0; }
.box-4 { animation: fadeUp 0.45s ease 0.60s both; opacity: 0; }
.box-5 { animation: fadeUp 0.45s ease 0.72s both; opacity: 0; }
.box-6 { animation: fadeUp 0.45s ease 0.84s both; opacity: 0; }
.box-7 { animation: fadeUp 0.45s ease 0.96s both; opacity: 0; }
.diagram { animation: fadeUp 0.6s ease 0.1s both; opacity: 0; }
</style>

<script>
function exportPNG() {
  const svg = document.getElementById('diagram');
  const SCALE = 4;
  const W = 900, H = 620;
  const clone = svg.cloneNode(true);
  // Remove scan elements if any
  const xml = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const canvas = document.createElement('canvas');
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'ichorai-architecture-4x.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.onerror = () => {
    const a = document.createElement('a');
    a.download = 'ichorai-architecture.svg';
    a.href = url;
    a.click();
  };
  img.src = url;
}
</script>
